<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基础数据 - 平台管理</title>
    
    <!-- Element Plus CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.5.3/dist/index.css">
    
    <style>
        /* ==================== 页面基础样式 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
        }
        
        /* ==================== 布局容器 ==================== */
        .app-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* ==================== 左侧侧边栏 ==================== */
        .sidebar {
            width: 220px;
            background-color: #001529;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
        }
        
        .sidebar-logo {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .menu-item {
            padding: 14px 24px;
            color: rgba(255,255,255,0.65);
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all 0.3s;
        }
        
        .menu-item:hover {
            color: #fff;
            background-color: rgba(255,255,255,0.05);
        }
        
        .menu-item.active {
            color: #fff;
            background-color: #1890ff;
        }
        
        .menu-icon {
            margin-right: 10px;
            font-size: 16px;
        }
        
        .submenu {
            background-color: rgba(0,0,0,0.15);
        }
        
        .submenu-item {
            padding: 10px 24px 10px 54px;
            color: rgba(255,255,255,0.65);
            cursor: pointer;
            font-size: 13px;
        }
        
        .submenu-item:hover {
            color: #fff;
        }
        
        .submenu-item.active {
            color: #1890ff;
            background-color: rgba(24,144,255,0.1);
        }
        
        /* ==================== 右侧主内容区 ==================== */
        .main-content {
            flex: 1;
            margin-left: 220px;
            display: flex;
            flex-direction: column;
        }
        
        /* ==================== 顶部面包屑 ==================== */
        .breadcrumb-header {
            background-color: #fff;
            padding: 16px 24px;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
        }
        
        .breadcrumb-item {
            color: #606266;
            font-size: 14px;
        }
        
        .breadcrumb-item a {
            color: #606266;
            text-decoration: none;
        }
        
        .breadcrumb-item a:hover {
            color: #1890ff;
        }
        
        .breadcrumb-separator {
            margin: 0 8px;
            color: #c0c4cc;
        }
        
        .breadcrumb-item:last-child {
            color: #303133;
            font-weight: 500;
        }
        
        /* ==================== 内容区域 ==================== */
        .content-wrapper {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        
        .content-card {
            background-color: #fff;
            border-radius: 4px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);
        }
        
        /* ==================== 搜索筛选区 ==================== */
        .search-section {
            padding: 20px;
            border-bottom: 1px solid #ebeef5;
        }
        
        .search-form {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .search-form .el-input,
        .search-form .el-select {
            width: 200px;
        }
        
        /* ==================== 操作按钮区 ==================== */
        .action-section {
            padding: 15px 20px;
            border-bottom: 1px solid #ebeef5;
            display: flex;
            gap: 10px;
        }
        
        /* ==================== 表格区域 ==================== */
        .table-section {
            padding: 0 20px 20px;
        }
        
        /* 平台图标样式 */
        .platform-icon {
            font-size: 24px;
            color: #409eff;
        }
        
        /* 状态标签样式 */
        .status-enabled {
            color: #67c23a;
        }
        
        .status-disabled {
            color: #f56c6c;
        }
        
        /* 操作按钮样式 */
        .action-btn {
            padding: 0 8px;
        }
        
        /* ==================== 分页区域 ==================== */
        .pagination-section {
            padding: 15px 20px;
            display: flex;
            justify-content: flex-end;
            border-top: 1px solid #ebeef5;
        }
        
        /* ==================== 图标样式 ==================== */
        .icon-channel::before {
            content: "📊";
        }
        
        .icon-lead::before {
            content: "👤";
        }
        
        .icon-report::before {
            content: "📈";
        }
        
        .icon-setting::before {
            content: "⚙️";
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="app-container">
            <!-- ==================== 左侧侧边栏 ==================== -->
            <aside class="sidebar">
                <div class="sidebar-logo">营销管理系统</div>
                <nav>
                    <!-- 🎯 线索管理 -->
                    <div class="menu-item">
                        <span class="menu-icon">🎯</span>
                        <span>线索管理</span>
                    </div>
                    <div class="submenu">
                        <a href="channel-list.html" style="text-decoration: none; display: block;"><div class="submenu-item">渠道列表</div></a>
                        <a href="transfer-monitor.html" style="text-decoration: none; display: block;"><div class="submenu-item">流转中监控</div></a>
                        <a href="manual-pool.html" style="text-decoration: none; display: block;"><div class="submenu-item">人工池</div></a>
                        <a href="allocation-record.html" style="text-decoration: none; display: block;"><div class="submenu-item">分配记录</div></a>
                    </div>
                    
                    <!-- 📈 数据报表 -->
                    <a href="report-channel.html" style="text-decoration: none; display: block;">
                    <div class="menu-item">
                        <span class="menu-icon">📈</span>
                        <span>数据报表</span>
                    </div>
                </a>
                    <div class="submenu">
                        <a href="report-channel.html" style="text-decoration: none; display: block;"><div class="submenu-item">渠道维度</div></a>
                        <a href="report-promoter.html" style="text-decoration: none; display: block;"><div class="submenu-item">推广员维度</div></a>
                        <a href="report-platform.html" style="text-decoration: none; display: block;"><div class="submenu-item">平台维度</div></a>
                        <a href="report-sales.html" style="text-decoration: none; display: block;"><div class="submenu-item">销售绩效</div></a>
                    </div>
                    
                    <!-- ⚙️ 基础数据 (active) -->
                    <a href="promoter-manage.html" style="text-decoration: none; display: block;">
                    <div class="menu-item active">
                        <span class="menu-icon">⚙️</span>
                        <span>基础数据</span>
                    </div>
                </a>
                    <div class="submenu">
                        <a href="promoter-manage.html" style="text-decoration: none; display: block;"><div class="submenu-item">推广员管理</div></a>
                        <a href="platform-manage.html" style="text-decoration: none; display: block;"><div class="submenu-item active">平台管理</div></a>
                        <a href="sales-manage.html" style="text-decoration: none; display: block;"><div class="submenu-item">销售人员管理</div></a>
                    </div>
                </nav>
            </aside>

            <!-- ==================== 右侧主内容区 ==================== -->
            <main class="main-content">
                <!-- 顶部面包屑导航 -->
                <header class="breadcrumb-header">
                    <span class="breadcrumb-item"><a href="index.html">首页</a></span>
                    <span class="breadcrumb-separator">/</span>
                    <span class="breadcrumb-item">基础数据</span>
                    <span class="breadcrumb-separator">/</span>
                    <span class="breadcrumb-item">平台管理</span>
                </header>

                <!-- 内容区域 -->
                <div class="content-wrapper">
                    <div class="content-card">
                        <!-- ==================== 搜索筛选区 ==================== -->
                        <div class="search-section">
                            <el-form :inline="true" class="search-form">
                                <!-- 平台名称搜索 -->
                                <el-form-item label="平台名称">
                                    <el-input 
                                        v-model="searchForm.name" 
                                        placeholder="请输入平台名称"
                                        clearable
                                        @keyup.enter="handleSearch"
                                    ></el-input>
                                </el-form-item>
                                
                                <!-- 搜索和重置按钮 -->
                                <el-form-item>
                                    <el-button type="primary" @click="handleSearch">
                                        <el-icon><search /></el-icon>搜索
                                    </el-button>
                                    <el-button @click="handleReset">重置</el-button>
                                </el-form-item>
                            </el-form>
                        </div>

                        <!-- ==================== 操作按钮区 ==================== -->
                        <div class="action-section">
                            <el-button type="primary" @click="handleAdd">
                                <el-icon><plus /></el-icon>新增平台
                            </el-button>
                        </div>

                        <!-- ==================== 数据表格区 ==================== -->
                        <div class="table-section">
                            <el-table 
                                :data="paginatedData" 
                                style="width: 100%"
                                v-loading="loading"
                                border
                            >
                                <!-- 平台ID -->
                                <el-table-column prop="id" label="平台ID" width="80" align="center"></el-table-column>
                                
                                <!-- 平台名称 -->
                                <el-table-column prop="name" label="平台名称" min-width="150" show-overflow-tooltip></el-table-column>
                                
                                <!-- 关联渠道数 -->
                                <el-table-column prop="relatedChannels" label="关联渠道数" width="120" align="center">
                                    <template #default="scope">
                                        <el-tag size="small" type="info">{{ scope.row.relatedChannels }}</el-tag>
                                    </template>
                                </el-table-column>
                                
                                <!-- 创建时间 -->
                                <el-table-column prop="createTime" label="创建时间" width="160" align="center"></el-table-column>
                                
                                <!-- 操作列 -->
                                <el-table-column label="操作" width="180" fixed="right" align="center">
                                    <template #default="scope">
                                        <el-button 
                                            link 
                                            type="primary" 
                                            size="small"
                                            @click="handleEdit(scope.row)"
                                            class="action-btn"
                                        >
                                            编辑
                                        </el-button>
                                    </template>
                                </el-table-column>
                            </el-table>
                        </div>

                        <!-- ==================== 分页器 ==================== -->
                        <div class="pagination-section">
                            <el-pagination
                                v-model:current-page="pagination.currentPage"
                                v-model:page-size="pagination.pageSize"
                                :page-sizes="[10, 20, 50, 100]"
                                :total="filteredData.length"
                                layout="total, sizes, prev, pager, next, jumper"
                                @size-change="handleSizeChange"
                                @current-change="handleCurrentChange"
                            ></el-pagination>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- ==================== 新增/编辑对话框 ==================== -->
        <el-dialog
            v-model="dialogVisible"
            :title="dialogTitle"
            width="500px"
            :close-on-click-modal="false"
        >
            <el-form 
                :model="formData" 
                :rules="formRules" 
                ref="formRef"
                label-width="100px"
            >
                <!-- 平台名称 -->
                <el-form-item label="平台名称" prop="name">
                    <el-input 
                        v-model="formData.name" 
                        placeholder="请输入平台名称"
                        maxlength="50"
                        show-word-limit
                    ></el-input>
                </el-form-item>
            </el-form>
            
            <template #footer>
                <span class="dialog-footer">
                    <el-button @click="dialogVisible = false">取消</el-button>
                    <el-button type="primary" @click="handleSubmit">确定</el-button>
                </span>
            </template>
        </el-dialog>
    </div>

    <!-- Vue 3 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.13/dist/vue.global.js"></script>
    <!-- Element Plus CDN -->
    <script src="https://cdn.jsdelivr.net/npm/element-plus@2.5.3/dist/index.full.js"></script>
    <!-- Element Plus Icons -->
    <script src="https://cdn.jsdelivr.net/npm/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>

    <script>
        const { createApp, ref, reactive, computed, onMounted } = Vue;
        const { Search, Plus } = ElementPlusIconsVue;

        createApp({
            components: {
                Search,
                Plus
            },
            setup() {
                // ==================== 加载状态 ====================
                const loading = ref(false);
                
                // ==================== 搜索表单数据 ====================
                const searchForm = reactive({
                    name: ''            // 平台名称
                });

                // ==================== Mock 数据 ====================
                /**
                 * 生成Mock数据
                 * @returns {Object[]} 平台数据数组
                 */
                const generateMockData = () => {
                    const platforms = [
                        { id: 1, name: '小红书', relatedChannels: 12 },
                        { id: 2, name: '抖音', relatedChannels: 18 },
                        { id: 3, name: '百度', relatedChannels: 8 },
                        { id: 4, name: '微信朋友圈', relatedChannels: 15 },
                        { id: 5, name: '官网注册', relatedChannels: 6 },
                        { id: 6, name: '线下展会', relatedChannels: 4 },
                        { id: 7, name: '知乎', relatedChannels: 9 },
                        { id: 8, name: 'B站', relatedChannels: 11 }
                    ];

                    return platforms.map((platform, index) => ({
                        ...platform,
                        createTime: `2024-${String(Math.floor(Math.random() * 12) + 1).padStart(2, '0')}-${String(Math.floor(Math.random() * 28) + 1).padStart(2, '0')} ${String(Math.floor(Math.random() * 24)).padStart(2, '0')}:${String(Math.floor(Math.random() * 60)).padStart(2, '0')}`
                    }));
                };

                // 原始数据
                const tableData = ref(generateMockData());

                // ==================== 对话框相关 ====================
                const dialogVisible = ref(false);
                const dialogTitle = ref('新增平台');
                const formRef = ref(null);
                const isEdit = ref(false);
                const editId = ref(null);

                // 表单数据
                const formData = reactive({
                    name: ''
                });

                // 表单校验规则
                const formRules = {
                    name: [
                        { required: true, message: '请输入平台名称', trigger: 'blur' },
                        { min: 2, max: 50, message: '长度在 2 到 50 个字符', trigger: 'blur' }
                    ]
                };

                // ==================== 分页相关 ====================
                const pagination = reactive({
                    currentPage: 1,
                    pageSize: 10
                });

                // ==================== 计算属性 ====================
                
                /**
                 * 筛选后的数据
                 */
                const filteredData = computed(() => {
                    return tableData.value.filter(item => {
                        // 平台名称筛选
                        if (searchForm.name && !item.name.includes(searchForm.name)) {
                            return false;
                        }
                        return true;
                    });
                });

                /**
                 * 分页后的数据
                 */
                const paginatedData = computed(() => {
                    const start = (pagination.currentPage - 1) * pagination.pageSize;
                    const end = start + pagination.pageSize;
                    return filteredData.value.slice(start, end);
                });

                // ==================== 方法 ====================

                /**
                 * 搜索按钮点击
                 */
                const handleSearch = () => {
                    pagination.currentPage = 1;
                };

                /**
                 * 重置按钮点击
                 */
                const handleReset = () => {
                    searchForm.name = '';
                    pagination.currentPage = 1;
                };

                /**
                 * 新增平台
                 */
                const handleAdd = () => {
                    isEdit.value = false;
                    editId.value = null;
                    dialogTitle.value = '新增平台';
                    // 重置表单
                    formData.name = '';
                    dialogVisible.value = true;
                };

                /**
                 * 编辑平台
                 * @param {Object} row - 行数据
                 */
                const handleEdit = (row) => {
                    isEdit.value = true;
                    editId.value = row.id;
                    dialogTitle.value = '编辑平台';
                    // 填充表单
                    formData.name = row.name;
                    dialogVisible.value = true;
                };

                /**
                 * 提交表单
                 */
                const handleSubmit = () => {
                    formRef.value.validate((valid) => {
                        if (valid) {
                            if (isEdit.value) {
                                // 编辑模式
                                const index = tableData.value.findIndex(item => item.id === editId.value);
                                if (index !== -1) {
                                    tableData.value[index].name = formData.name;
                                    ElementPlus.ElMessage.success('编辑成功');
                                }
                            } else {
                                // 新增模式
                                const newId = Math.max(...tableData.value.map(item => item.id)) + 1;
                                const now = new Date();
                                const createTime = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                                tableData.value.unshift({
                                    id: newId,
                                    name: formData.name,
                                    relatedChannels: 0,
                                    createTime: createTime
                                });
                                ElementPlus.ElMessage.success('新增成功');
                            }
                            dialogVisible.value = false;
                        }
                    });
                };



                /**
                 * 每页条数变化
                 */
                const handleSizeChange = (val) => {
                    pagination.pageSize = val;
                    pagination.currentPage = 1;
                };

                /**
                 * 页码变化
                 */
                const handleCurrentChange = (val) => {
                    pagination.currentPage = val;
                };

                // ==================== 生命周期 ====================
                onMounted(() => {
                    loading.value = true;
                    // 模拟加载延迟
                    setTimeout(() => {
                        loading.value = false;
                    }, 300);
                });

                return {
                    // 数据
                    loading,
                    searchForm,
                    tableData,
                    pagination,
                    filteredData,
                    paginatedData,
                    // 对话框相关
                    dialogVisible,
                    dialogTitle,
                    formRef,
                    formData,
                    formRules,
                    // 方法
                    handleSearch,
                    handleReset,
                    handleAdd,
                    handleEdit,
                    handleSubmit,

                    handleSizeChange,
                    handleCurrentChange
                };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
