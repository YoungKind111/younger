<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推广员管理</title>
    
    <!-- Element Plus CSS CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus@2.4.4/dist/index.css">
    
    <!-- 自定义样式 -->
    <style>
        /* ===== 页面基础样式重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Helvetica Neue', Helvetica, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }
        
        /* ===== 布局容器 ===== */
        .app-container {
            display: flex;
            height: 100vh;
        }
        
        /* ===== 左侧侧边栏 ===== */
        .sidebar {
            width: 220px;
            background-color: #001529;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
        }
        
        /* 侧边栏Logo区域 */
        .sidebar-logo {
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        /* 侧边栏菜单样式 */
        .sidebar-menu {
            padding: 10px 0;
        }
        
        .menu-item {
            padding: 14px 24px;
            color: rgba(255,255,255,0.65);
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all 0.3s;
        }
        
        .menu-item:hover {
            color: #fff;
            background-color: rgba(255,255,255,0.05);
        }
        
        .menu-item.active {
            color: #fff;
            background-color: #1890ff;
        }
        
        .menu-icon {
            margin-right: 10px;
            font-size: 16px;
        }
        
        /* 二级菜单 */
        .submenu {
            background-color: rgba(0,0,0,0.15);
        }
        
        .submenu-item {
            padding: 10px 24px 10px 54px;
            color: rgba(255,255,255,0.65);
            cursor: pointer;
            font-size: 13px;
        }
        
        .submenu-item:hover {
            color: #fff;
        }
        
        .submenu-item.active {
            color: #1890ff;
            background-color: rgba(24,144,255,0.1);
        }
        
        /* ===== 右侧主内容区 ===== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-left: 220px;
        }
        
        /* ===== 顶部面包屑导航 ===== */
        .breadcrumb-header {
            height: 50px;
            background-color: #fff;
            border-bottom: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            padding: 0 20px;
            flex-shrink: 0;
        }
        
        .breadcrumb-item {
            color: #606266;
            font-size: 14px;
        }
        
        .breadcrumb-item a {
            color: #606266;
            text-decoration: none;
        }
        
        .breadcrumb-item a:hover {
            color: #1890ff;
        }
        
        .breadcrumb-separator {
            margin: 0 8px;
            color: #c0c4cc;
        }
        
        .breadcrumb-item:last-child {
            color: #303133;
            font-weight: 500;
        }
        
        /* ===== 内容区域 ===== */
        .content-wrapper {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        
        /* ===== 卡片样式 ===== */
        .content-card {
            background-color: #fff;
            border-radius: 4px;
            padding: 20px;
            box-shadow: 0 2px 12px 0 rgba(0, 0, 0, 0.05);
        }
        
        /* ===== 搜索筛选区 ===== */
        .search-section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #ebeef5;
        }
        
        .search-form {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
        }
        
        .search-form .el-input,
        .search-form .el-select {
            width: 200px;
        }
        
        /* ===== 操作按钮区 ===== */
        .operation-section {
            margin-bottom: 20px;
        }
        
        /* ===== 表格样式优化 ===== */
        .el-table {
            margin-top: 10px;
        }
        
        /* 关联渠道数字样式 */
        .channel-count {
            color: #1890ff;
            cursor: pointer;
            font-weight: 500;
        }
        
        .channel-count:hover {
            text-decoration: underline;
        }
        
        /* 状态标签样式 */
        .status-enabled {
            color: #67c23a;
        }
        
        .status-disabled {
            color: #f56c6c;
        }
        
        /* ===== 分页器样式 ===== */
        .pagination-section {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
        }
        
        /* ===== 对话框表单样式 ===== */
        .dialog-form .el-form-item {
            margin-bottom: 20px;
        }
        
        /* ===== 渠道列表样式 ===== */
        .channel-list {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .channel-item {
            padding: 12px 15px;
            border-bottom: 1px solid #ebeef5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .channel-item:last-child {
            border-bottom: none;
        }
        
        .channel-item:hover {
            background-color: #f5f7fa;
        }
        
        .channel-name {
            font-weight: 500;
            color: #303133;
        }
        
        .channel-code {
            color: #909399;
            font-size: 13px;
            margin-top: 4px;
        }
        
        .channel-status {
            font-size: 12px;
        }
        
        .empty-channel {
            text-align: center;
            padding: 40px;
            color: #909399;
        }
        
        /* ===== 响应式适配 ===== */
        @media (max-width: 768px) {
            .sidebar {
                width: 64px;
            }
            
            .sidebar-logo-text,
            .menu-title span:not(.menu-icon),
            .submenu {
                display: none;
            }
            
            .menu-title {
                justify-content: center;
                padding: 15px;
            }
            
            .menu-icon {
                margin-right: 0;
            }
        }
    </style>
</head>
<body>
    <div id="app" class="app-container">
        <!-- ===== 左侧侧边栏导航 ===== -->
        <aside class="sidebar">
            <!-- Logo区域 -->
            <div class="sidebar-logo">管理系统</div>
            
            <!-- 菜单区域 -->
            <div class="sidebar-menu">
                <!-- 🎯 线索管理 -->
                <div class="menu-item" @click="toggleMenu('leadManagement')">
                    <span class="menu-icon">🎯</span>
                    <span>线索管理</span>
                </div>
                <div class="submenu" v-show="menuStatus.leadManagement">
                    <a href="channel-list.html" style="text-decoration: none; display: block;"><div class="submenu-item">渠道列表</div></a>
                    <a href="transfer-monitor.html" style="text-decoration: none; display: block;"><div class="submenu-item">流转中监控</div></a>
                    <a href="manual-pool.html" style="text-decoration: none; display: block;"><div class="submenu-item">人工池</div></a>
                    <a href="allocation-record.html" style="text-decoration: none; display: block;"><div class="submenu-item">分配记录</div></a>
                </div>
                
                <!-- 数据报表 -->
                <div class="menu-item" @click="toggleMenu('dataReport')">
                    <span class="menu-icon">📈</span>
                    <span>数据报表</span>
                </div>
                <div class="submenu" v-show="menuStatus.dataReport">
                    <a href="report-channel.html" style="text-decoration: none; display: block;"><div class="submenu-item">渠道维度</div></a>
                    <a href="report-promoter.html" style="text-decoration: none; display: block;"><div class="submenu-item">推广员维度</div></a>
                    <a href="report-platform.html" style="text-decoration: none; display: block;"><div class="submenu-item">平台维度</div></a>
                    <a href="report-sales.html" style="text-decoration: none; display: block;"><div class="submenu-item">销售绩效</div></a>
                </div>
                
                <!-- 基础数据 -->
                <div class="menu-item active" @click="toggleMenu('basicData')">
                    <span class="menu-icon">⚙️</span>
                    <span>基础数据</span>
                </div>
                <div class="submenu" v-show="menuStatus.basicData">
                    <a href="promoter-manage.html" style="text-decoration: none; display: block;"><div class="submenu-item active">推广员管理</div></a>
                    <a href="platform-manage.html" style="text-decoration: none; display: block;"><div class="submenu-item">平台管理</div></a>
                    <a href="sales-manage.html" style="text-decoration: none; display: block;"><div class="submenu-item">销售人员管理</div></a>
                </div>
            </div>
        </aside>
        
        <!-- ===== 右侧主内容区 ===== -->
        <main class="main-content">
            <!-- 顶部面包屑导航 -->
            <header class="breadcrumb-header">
                <span class="breadcrumb-item">
                    <a href="index.html">首页</a>
                </span>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-item">基础数据</span>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-item">推广员管理</span>
            </header>
            
            <!-- 内容区域 -->
            <div class="content-wrapper">
                <div class="content-card">
                    <!-- 搜索筛选区 -->
                    <div class="search-section">
                        <el-form :inline="true" :model="searchForm" class="search-form">
                            <!-- 推广员名称搜索 -->
                            <el-form-item label="推广员名称">
                                <el-input 
                                    v-model="searchForm.name" 
                                    placeholder="请输入推广员名称"
                                    clearable
                                    @keyup.enter="handleSearch">
                                </el-input>
                            </el-form-item>
                            
                            <!-- 搜索按钮 -->
                            <el-form-item>
                                <el-button type="primary" @click="handleSearch">
                                    查询
                                </el-button>
                                <el-button @click="handleReset">
                                    重置
                                </el-button>
                            </el-form-item>
                        </el-form>
                    </div>
                    
                    <!-- 操作按钮区 -->
                    <div class="operation-section">
                        <el-button type="primary" @click="handleAdd">
                            <span style="margin-right: 5px;">+</span>新增推广员
                        </el-button>
                    </div>
                    
                    <!-- 数据表格区 -->
                    <el-table 
                        :data="tableData" 
                        border 
                        stripe
                        v-loading="loading"
                        style="width: 100%">
                        <!-- 推广员ID列 -->
                        <el-table-column prop="id" label="推广员ID" width="100" align="center"></el-table-column>
                        
                        <!-- 推广员姓名列 -->
                        <el-table-column prop="name" label="推广员姓名" width="120" align="center"></el-table-column>
                        
                        <!-- 关联渠道数列 -->
                        <el-table-column label="关联渠道数" width="120" align="center">
                            <template #default="scope">
                                <span 
                                    class="channel-count" 
                                    @click="handleViewChannels(scope.row)">
                                    {{ scope.row.relatedChannels.length }}
                                </span>
                            </template>
                        </el-table-column>
                        
                        <!-- 创建时间列 -->
                        <el-table-column prop="createTime" label="创建时间" width="180" align="center"></el-table-column>
                        
                        <!-- 操作列 -->
                        <el-table-column label="操作" min-width="180" align="center" fixed="right">
                            <template #default="scope">
                                <el-button 
                                    link 
                                    type="primary" 
                                    size="small"
                                    @click="handleEdit(scope.row)">
                                    编辑
                                </el-button>
                            </template>
                        </el-table-column>
                    </el-table>
                    
                    <!-- 分页器 -->
                    <div class="pagination-section">
                        <el-pagination
                            v-model:current-page="pagination.page"
                            v-model:page-size="pagination.pageSize"
                            :page-sizes="[10, 20, 50, 100]"
                            :total="pagination.total"
                            layout="total, sizes, prev, pager, next, jumper"
                            @size-change="handleSizeChange"
                            @current-change="handlePageChange">
                        </el-pagination>
                    </div>
                </div>
            </div>
        </main>
        
        <!-- ===== 新增/编辑推广员对话框 ===== -->
        <el-dialog
            v-model="dialogVisible"
            :title="dialogTitle"
            width="500px"
            :close-on-click-modal="false">
            <el-form 
                :model="formData" 
                :rules="formRules"
                ref="formRef"
                label-width="100px"
                class="dialog-form">
                <!-- 推广员姓名 -->
                <el-form-item label="推广员姓名" prop="name">
                    <el-input 
                        v-model="formData.name" 
                        placeholder="请输入推广员姓名"
                        maxlength="20"
                        show-word-limit>
                    </el-input>
                </el-form-item>
                
            </el-form>
            
            <!-- 对话框底部按钮 -->
            <template #footer>
                <span class="dialog-footer">
                    <el-button @click="dialogVisible = false">取消</el-button>
                    <el-button type="primary" @click="handleSubmit" :loading="submitLoading">
                        确定
                    </el-button>
                </span>
            </template>
        </el-dialog>
        
        <!-- ===== 关联渠道列表抽屉 ===== -->
        <el-drawer
            v-model="drawerVisible"
            :title="`${currentPromoter ? currentPromoter.name : ''} - 关联渠道列表`"
            size="400px"
            direction="rtl">
            <div class="channel-list" v-if="currentPromoter && currentPromoter.relatedChannels.length > 0">
                <div 
                    class="channel-item" 
                    v-for="channel in currentPromoter.relatedChannels" 
                    :key="channel.id">
                    <div class="channel-info">
                        <div class="channel-name">{{ channel.name }}</div>
                        <div class="channel-code">渠道编码: {{ channel.code }}</div>
                    </div>
                    <el-tag 
                        :type="channel.status === 1 ? 'success' : 'danger'"
                        size="small"
                        class="channel-status">
                        {{ channel.status === 1 ? '启用' : '停用' }}
                    </el-tag>
                </div>
            </div>
            <div class="empty-channel" v-else>
                <el-empty description="暂无关联渠道"></el-empty>
            </div>
        </el-drawer>
    </div>
    
    <!-- Vue 3 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/vue@3.3.4/dist/vue.global.js"></script>
    <!-- Element Plus CDN -->
    <script src="https://cdn.jsdelivr.net/npm/element-plus@2.4.4/dist/index.full.js"></script>
    <!-- Element Plus 中文语言包 -->
    <script src="https://cdn.jsdelivr.net/npm/element-plus@2.4.4/dist/locale/zh-cn.min.js"></script>
    
    <script>
        // 使用 Vue 3 的 createApp 创建应用实例
        const { createApp, ref, reactive, computed, onMounted } = Vue;
        
        // 创建应用
        const app = createApp({
            setup() {
                // ===== 菜单状态管理 =====
                const menuStatus = reactive({
                    leadManagement: false,  // 线索管理菜单展开状态
                    dataReport: false,      // 数据报表菜单展开状态
                    basicData: true         // 基础数据菜单展开状态（当前页面在此模块）
                });
                
                // ===== 搜索表单数据 =====
                const searchForm = reactive({
                    name: ''    // 推广员名称
                });
                
                // ===== 分页相关数据 =====
                const pagination = reactive({
                    page: 1,      // 当前页码
                    pageSize: 10, // 每页条数
                    total: 0      // 总条数
                });
                
                // ===== 表格数据 =====
                const tableData = ref([]);
                const loading = ref(false);
                
                // ===== Mock 数据 =====
                // 渠道Mock数据（用于关联）
                const mockChannels = [
                    { id: 1, name: '百度推广', code: 'BD001', status: 1 },
                    { id: 2, name: '微信朋友圈广告', code: 'WX001', status: 1 },
                    { id: 3, name: '抖音短视频', code: 'DY001', status: 1 },
                    { id: 4, name: '小红书种草', code: 'XHS001', status: 0 },
                    { id: 5, name: '知乎问答', code: 'ZH001', status: 1 },
                    { id: 6, name: 'B站视频', code: 'BZ001', status: 1 },
                    { id: 7, name: '快手直播', code: 'KS001', status: 0 },
                    { id: 8, name: '微博推广', code: 'WB001', status: 1 },
                    { id: 9, name: '今日头条', code: 'JR001', status: 1 },
                    { id: 10, name: '地推活动', code: 'DT001', status: 1 }
                ];
                
                // 推广员Mock数据（12条）
                const mockPromoters = [
                    {
                        id: 1001,
                        name: '张伟',

                        relatedChannels: [mockChannels[0], mockChannels[1]],
                        status: 1,
                        createTime: '2024-01-15 09:30:00'
                    },
                    {
                        id: 1002,
                        name: '李娜',

                        relatedChannels: [mockChannels[2], mockChannels[3], mockChannels[4]],
                        status: 1,
                        createTime: '2024-01-16 14:20:00'
                    },
                    {
                        id: 1003,
                        name: '王强',

                        relatedChannels: [mockChannels[1]],
                        status: 0,
                        createTime: '2024-01-18 11:00:00'
                    },
                    {
                        id: 1004,
                        name: '刘芳',

                        relatedChannels: [mockChannels[5], mockChannels[6]],
                        status: 1,
                        createTime: '2024-01-20 16:45:00'
                    },
                    {
                        id: 1005,
                        name: '陈明',

                        relatedChannels: [mockChannels[0], mockChannels[7], mockChannels[8]],
                        status: 1,
                        createTime: '2024-01-22 08:15:00'
                    },
                    {
                        id: 1006,
                        name: '杨雪',

                        relatedChannels: [mockChannels[9]],
                        status: 1,
                        createTime: '2024-01-25 13:30:00'
                    },
                    {
                        id: 1007,
                        name: '赵军',

                        relatedChannels: [mockChannels[2], mockChannels[4], mockChannels[6]],
                        status: 0,
                        createTime: '2024-01-28 10:00:00'
                    },
                    {
                        id: 1008,
                        name: '孙丽',

                        relatedChannels: [mockChannels[3], mockChannels[5]],
                        status: 1,
                        createTime: '2024-02-01 15:20:00'
                    },
                    {
                        id: 1009,
                        name: '周杰',

                        relatedChannels: [mockChannels[1], mockChannels[7], mockChannels[9]],
                        status: 1,
                        createTime: '2024-02-05 09:45:00'
                    },
                    {
                        id: 1010,
                        name: '吴敏',

                        relatedChannels: [mockChannels[0], mockChannels[2]],
                        status: 1,
                        createTime: '2024-02-08 14:00:00'
                    },
                    {
                        id: 1011,
                        name: '郑华',

                        relatedChannels: [mockChannels[4], mockChannels[8]],
                        status: 0,
                        createTime: '2024-02-10 11:30:00'
                    },
                    {
                        id: 1012,
                        name: '钱红',

                        relatedChannels: [mockChannels[5], mockChannels[6], mockChannels[7]],
                        status: 1,
                        createTime: '2024-02-15 16:00:00'
                    }
                ];
                
                // ===== 对话框相关数据 =====
                const dialogVisible = ref(false);
                const dialogTitle = ref('新增推广员');
                const formRef = ref(null);
                const submitLoading = ref(false);
                const isEdit = ref(false);
                const currentId = ref(null);
                
                // 表单数据
                const formData = reactive({
                    name: ''
                });
                
                // 表单验证规则
                const formRules = {
                    name: [
                        { required: true, message: '请输入推广员姓名', trigger: 'blur' },
                        { min: 2, max: 20, message: '长度在 2 到 20 个字符', trigger: 'blur' }
                    ],
                    phone: [
                        { required: true, message: '请输入联系电话', trigger: 'blur' },
                        { pattern: /^1[3-9]\d{9}$/, message: '请输入正确的手机号码', trigger: 'blur' }
                    ],

                };
                
                // ===== 抽屉相关数据 =====
                const drawerVisible = ref(false);
                const currentPromoter = ref(null);
                
                // ===== 方法定义 =====
                
                /**
                 * 切换菜单展开/收起状态
                 * @param {string} menuKey - 菜单标识
                 */
                const toggleMenu = (menuKey) => {
                    menuStatus[menuKey] = !menuStatus[menuKey];
                };
                
                /**
                 * 页面跳转
                 * @param {string} url - 目标页面地址
                 */
                const goToPage = (url) => {
                    window.location.href = url;
                };
                
                /**
                 * 搜索方法
                 */
                const handleSearch = () => {
                    pagination.page = 1;
                    fetchData();
                };
                
                /**
                 * 重置搜索条件
                 */
                const handleReset = () => {
                    searchForm.name = '';
                    pagination.page = 1;
                    fetchData();
                };
                
                /**
                 * 获取表格数据（模拟接口请求）
                 */
                const fetchData = () => {
                    loading.value = true;
                    
                    // 模拟接口延迟
                    setTimeout(() => {
                        // 筛选数据
                        let filteredData = [...mockPromoters];
                        
                        // 按名称筛选
                        if (searchForm.name) {
                            filteredData = filteredData.filter(item => 
                                item.name.includes(searchForm.name)
                            );
                        }
                        
                        // 更新总数
                        pagination.total = filteredData.length;
                        
                        // 分页处理
                        const start = (pagination.page - 1) * pagination.pageSize;
                        const end = start + pagination.pageSize;
                        tableData.value = filteredData.slice(start, end);
                        
                        loading.value = false;
                    }, 300);
                };
                
                /**
                 * 每页条数改变
                 */
                const handleSizeChange = (size) => {
                    pagination.pageSize = size;
                    fetchData();
                };
                
                /**
                 * 页码改变
                 */
                const handlePageChange = (page) => {
                    pagination.page = page;
                    fetchData();
                };
                
                /**
                 * 新增推广员
                 */
                const handleAdd = () => {
                    isEdit.value = false;
                    currentId.value = null;
                    dialogTitle.value = '新增推广员';
                    
                    // 重置表单
                    formData.name = '';
                    
                    dialogVisible.value = true;
                };
                
                /**
                 * 编辑推广员
                 * @param {Object} row - 当前行数据
                 */
                const handleEdit = (row) => {
                    isEdit.value = true;
                    currentId.value = row.id;
                    dialogTitle.value = '编辑推广员';
                    
                    // 填充表单数据
                    formData.name = row.name;
                    
                    dialogVisible.value = true;
                };
                
                /**
                 * 提交表单
                 */
                const handleSubmit = async () => {
                    if (!formRef.value) return;
                    
                    await formRef.value.validate((valid) => {
                        if (valid) {
                            submitLoading.value = true;
                            
                            // 模拟提交延迟
                            setTimeout(() => {
                                if (isEdit.value) {
                                    // 编辑操作
                                    const index = mockPromoters.findIndex(item => item.id === currentId.value);
                                    if (index !== -1) {
                                        mockPromoters[index].name = formData.name;
                                    }
                                    ElementPlus.ElMessage.success('编辑成功');
                                } else {
                                    // 新增操作
                                    const newPromoter = {
                                        id: 1000 + mockPromoters.length + 1,
                                        name: formData.name,
                                        relatedChannels: [],
                                        status: 1,
                                        createTime: new Date().toLocaleString('zh-CN', {
                                            year: 'numeric',
                                            month: '2-digit',
                                            day: '2-digit',
                                            hour: '2-digit',
                                            minute: '2-digit',
                                            second: '2-digit'
                                        }).replace(/\//g, '-')
                                    };
                                    mockPromoters.unshift(newPromoter);
                                    ElementPlus.ElMessage.success('新增成功');
                                }
                                
                                submitLoading.value = false;
                                dialogVisible.value = false;
                                fetchData();
                            }, 500);
                        }
                    });
                };
                
                /**
                 * 切换状态（停用/启用）
                 * @param {Object} row - 当前行数据
                 */
                const handleToggleStatus = (row) => {
                    const actionText = row.status === 1 ? '停用' : '启用';
                    const newStatus = row.status === 1 ? 0 : 1;
                    
                    ElementPlus.ElMessageBox.confirm(
                        `确定要${actionText}推广员 "${row.name}" 吗？`,
                        '提示',
                        {
                            confirmButtonText: '确定',
                            cancelButtonText: '取消',
                            type: 'warning'
                        }
                    ).then(() => {
                        // 更新状态
                        const index = mockPromoters.findIndex(item => item.id === row.id);
                        if (index !== -1) {
                            mockPromoters[index].status = newStatus;
                        }
                        
                        ElementPlus.ElMessage.success(`${actionText}成功`);
                        fetchData();
                    }).catch(() => {
                        // 用户取消操作
                    });
                };
                
                /**
                 * 查看关联渠道列表
                 * @param {Object} row - 当前行数据
                 */
                const handleViewChannels = (row) => {
                    currentPromoter.value = row;
                    drawerVisible.value = true;
                };
                
                // ===== 生命周期钩子 =====
                onMounted(() => {
                    fetchData();
                });
                
                // ===== 返回模板中需要使用的数据和方法 =====
                return {
                    // 菜单相关
                    menuStatus,
                    toggleMenu,
                    goToPage,
                    
                    // 搜索相关
                    searchForm,
                    handleSearch,
                    handleReset,
                    
                    // 分页相关
                    pagination,
                    handleSizeChange,
                    handlePageChange,
                    
                    // 表格相关
                    tableData,
                    loading,
                    
                    // 对话框相关
                    dialogVisible,
                    dialogTitle,
                    formData,
                    formRules,
                    formRef,
                    submitLoading,
                    handleAdd,
                    handleEdit,
                    handleSubmit,
                    handleToggleStatus,
                    
                    // 抽屉相关
                    drawerVisible,
                    currentPromoter,
                    handleViewChannels
                };
            }
        });
        
        // 注册 Element Plus 组件
        app.use(ElementPlus, {
            locale: ElementPlusLocaleZhCn,
            zIndex: 3000
        });
        
        // 挂载应用
        app.mount('#app');
    </script>
</body>
</html>
