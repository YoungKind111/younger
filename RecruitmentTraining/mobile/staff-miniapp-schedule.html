<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>课程表</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #e8e8e8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .mobile-container {
      width: 375px;
      min-height: 100vh;
      background: #f5f5f5;
      position: relative;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    }
    .nav-header {
      background: #fff;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-bottom: 1px solid #f0f0f0;
    }
    .nav-back {
      position: absolute;
      left: 16px;
      font-size: 20px;
      color: #333;
      cursor: pointer;
    }
    .nav-title { font-size: 17px; font-weight: 600; color: #333; }

    .class-info-bar {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 16px 20px;
      color: #fff;
    }
    .class-info-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .class-info-date { font-size: 12px; opacity: 0.9; }

    .date-tabs {
      display: flex;
      overflow-x: auto;
      background: #fff;
      padding: 12px;
      gap: 8px;
      border-bottom: 1px solid #f0f0f0;
    }
    .date-tab {
      flex-shrink: 0;
      padding: 10px 16px;
      background: #f5f5f5;
      border-radius: 8px;
      text-align: center;
      min-width: 64px;
    }
    .date-tab.active {
      background: #667eea;
      color: #fff;
    }
    .date-tab-day { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .date-tab-date { font-size: 11px; }

    .schedule-list { padding: 12px; }
    .schedule-item {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .schedule-time {
      width: 60px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .time-start { font-size: 16px; font-weight: 600; color: #333; }
    .schedule-content { flex: 1; }
    .schedule-title { font-size: 15px; font-weight: 600; color: #333; }
  </style>
</head>
<body>
  <div class="mobile-container">
    <div class="nav-header">
      <span class="nav-back" onclick="history.back()">‹</span>
      <span class="nav-title">课程表</span>
    </div>

    <div class="class-info-bar">
      <div class="class-info-name">2026年4月月嫂新手班-A班</div>
      <div class="class-info-date">2026-04-01 至 2026-04-10</div>
    </div>

    <div class="date-tabs">
      <div class="date-tab">
        <div class="date-tab-day">第4天</div>
        <div class="date-tab-date">04/04</div>
      </div>
      <div class="date-tab">
        <div class="date-tab-day">第5天</div>
        <div class="date-tab-date">04/05</div>
      </div>
      <div class="date-tab active">
        <div class="date-tab-day">第6天</div>
        <div class="date-tab-date">04/06</div>
      </div>
      <div class="date-tab">
        <div class="date-tab-day">第7天</div>
        <div class="date-tab-date">04/07</div>
      </div>
      <div class="date-tab">
        <div class="date-tab-day">第8天</div>
        <div class="date-tab-date">04/08</div>
      </div>
    </div>

    <div class="schedule-list">
      <div class="schedule-item">
        <div class="schedule-time">
          <div class="time-start">09:00</div>
        </div>
        <div class="schedule-content">
          <div class="schedule-title">服务礼仪与沟通技巧</div>
        </div>
      </div>

      <div class="schedule-item">
        <div class="schedule-time">
          <div class="time-start">14:00</div>
        </div>
        <div class="schedule-content">
          <div class="schedule-title">情景模拟演练</div>
        </div>
      </div>

      <div class="schedule-item">
        <div class="schedule-time">
          <div class="time-start">19:00</div>
        </div>
        <div class="schedule-content">
          <div class="schedule-title">线上复习课</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
