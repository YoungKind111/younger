<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>护理人员报名登记 - 护理服务有限公司</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/element-plus/dist/index.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      padding: 20px;
    }
    .form-container {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .form-header {
      background: linear-gradient(135deg, #1890ff 0%, #36cfc9 100%);
      padding: 40px 30px;
      text-align: center;
      color: #fff;
    }
    .form-header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .form-header p {
      font-size: 14px;
      opacity: 0.9;
    }
    .referrer-info {
      background: #e6f7ff;
      border-left: 4px solid #1890ff;
      padding: 16px 20px;
      margin: 20px;
      border-radius: 6px;
    }
    .referrer-info.has-referrer {
      background: #f6ffed;
      border-left-color: #52c41a;
    }
    .referrer-label {
      font-size: 12px;
      color: #8c8c8c;
      margin-bottom: 4px;
    }
    .referrer-name {
      font-size: 16px;
      font-weight: 600;
      color: #262626;
    }
    .referrer-code-input {
      margin-top: 12px;
    }
    .form-body {
      padding: 30px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: #262626;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #f0f0f0;
    }
    .form-item {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 14px;
      color: #262626;
      margin-bottom: 8px;
    }
    .form-label .required {
      color: #f5222d;
      margin-left: 4px;
    }
    .form-tip {
      font-size: 12px;
      color: #8c8c8c;
      margin-top: 4px;
    }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1890ff 0%, #36cfc9 100%);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(24, 144, 255, 0.4);
    }
    .success-message {
      text-align: center;
      padding: 60px 30px;
    }
    .success-icon {
      width: 80px;
      height: 80px;
      background: #52c41a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      color: #fff;
      font-size: 40px;
    }
    .success-title {
      font-size: 24px;
      font-weight: 600;
      color: #262626;
      margin-bottom: 12px;
    }
    .success-desc {
      font-size: 14px;
      color: #8c8c8c;
      line-height: 1.6;
    }
    .contact-info {
      margin-top: 30px;
      padding: 20px;
      background: #fafafa;
      border-radius: 8px;
      text-align: center;
    }
    .contact-info h3 {
      font-size: 14px;
      color: #262626;
      margin-bottom: 12px;
    }
    .contact-info p {
      font-size: 13px;
      color: #8c8c8c;
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="form-container">
      <!-- 头部 -->
      <div class="form-header">
        <h1>🏥 护理人员报名登记</h1>
        <p>填写报名信息，开启您的护理职业生涯</p>
      </div>

      <!-- 推荐人信息 -->
      <div v-if="channelInfo" class="referrer-info" :class="{ 'has-referrer': referrerInfo }">
        <div class="referrer-label">来源渠道</div>
        <div class="referrer-name">
          <i class="el-icon-share" style="margin-right: 4px;"></i>{{ channelInfo.name }}
        </div>
        <div v-if="referrerInfo" style="margin-top: 8px;">
          <div class="referrer-label">推荐人</div>
          <div class="referrer-name" style="color: #52c41a;">
            <i class="el-icon-user" style="margin-right: 4px;"></i>{{ referrerInfo.name }}
          </div>
        </div>
        <div v-else class="referrer-code-input">
          <div class="referrer-label">有推荐人邀请码？</div>
          <div style="display: flex; gap: 8px;">
            <el-input v-model="inviteCodeInput" placeholder="请输入6位邀请码" maxlength="10" style="flex: 1;"></el-input>
            <el-button type="primary" @click="verifyInviteCode">验证</el-button>
          </div>
        </div>
      </div>

      <!-- 表单内容 -->
      <div v-if="!submitted" class="form-body">
        <div class="section-title">基本信息</div>

        <el-form :model="form" :rules="rules" ref="formRef" label-position="top">
          <el-form-item label="姓名" prop="name" required>
            <el-input v-model="form.name" placeholder="请输入您的真实姓名" size="large"></el-input>
          </el-form-item>

          <el-form-item label="手机号码" prop="phone" required>
            <el-input v-model="form.phone" placeholder="请输入手机号码" maxlength="11" size="large">
              <template #append>
                <el-button type="primary" :disabled="smsCountdown > 0 || !form.phone" @click="sendSmsCode">
                  {{ smsCountdown > 0 ? smsCountdown + 's' : '获取验证码' }}
                </el-button>
              </template>
            </el-input>
          </el-form-item>

          <el-form-item label="验证码" prop="smsCode" required>
            <el-input v-model="form.smsCode" placeholder="请输入短信验证码" maxlength="6" size="large"></el-input>
          </el-form-item>

          <el-form-item label="年龄" prop="age" required>
            <el-input-number v-model="form.age" :min="18" :max="60" style="width: 100%;" size="large"></el-input-number>
          </el-form-item>

          <el-form-item label="目标岗位" prop="position" required>
            <el-select v-model="form.position" placeholder="请选择意向岗位" style="width: 100%;" size="large">
              <el-option label="月嫂" value="yuesao"></el-option>
              <el-option label="育婴师/育儿嫂" value="yuying"></el-option>
              <el-option label="催乳师" value="cuiru"></el-option>
              <el-option label="产后康复师" value="chanhou"></el-option>
              <el-option label="老年护工" value="hugong"></el-option>
              <el-option label="养老护理员" value="yanglao"></el-option>
              <el-option label="医院护工" value="yiyuan"></el-option>
              <el-option label="康复护理师" value="kangfu"></el-option>
            </el-select>
          </el-form-item>

          <el-form-item label="是否有相关经验" prop="experience" required>
            <el-radio-group v-model="form.experience">
              <el-radio label="yes">有经验</el-radio>
              <el-radio label="no">无经验（新手）</el-radio>
            </el-radio-group>
          </el-form-item>

          <el-form-item label="期望薪资范围" prop="salary">
            <el-select v-model="form.salary" placeholder="请选择期望薪资" style="width: 100%;" size="large">
              <el-option label="6000-8000元" value="6-8k"></el-option>
              <el-option label="8000-10000元" value="8-10k"></el-option>
              <el-option label="10000-15000元" value="10-15k"></el-option>
              <el-option label="15000元以上" value="15k+"></el-option>
            </el-select>
          </el-form-item>

          <el-form-item label="备注说明" prop="remark">
            <el-input v-model="form.remark" type="textarea" :rows="3" placeholder="如有其他问题或需求，请在此说明"></el-input>
          </el-form-item>

          <el-button type="primary" class="submit-btn" @click="submitForm">
            提交报名
          </el-button>
        </el-form>
      </div>

      <!-- 提交成功 -->
      <div v-else class="success-message">
        <div class="success-icon">
          <i class="el-icon-check"></i>
        </div>
        <div class="success-title">报名提交成功！</div>
        <div class="success-desc">
          <p>您的报名信息已成功提交，我们的招募顾问将在24小时内与您联系。</p>
          <p style="margin-top: 12px;">请保持手机畅通，感谢您对咱们的信任！</p>
        </div>
        <div style="margin-top: 30px;">
          <el-button type="primary" @click="submitAnother">继续报名</el-button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/element-plus"></script>

  <script>
    const { createApp, ref, reactive, onMounted } = Vue;

    createApp({
      setup() {
        const formRef = ref(null);
        const submitted = ref(false);
        const inviteCodeInput = ref('');

        // 从URL参数获取渠道和推荐人信息
        const urlParams = new URLSearchParams(window.location.search);
        const channelCode = urlParams.get('code') || '';
        const referrerCode = urlParams.get('referrer') || '';

        // 渠道信息（模拟数据）
        const channelInfo = ref(null);
        const referrerInfo = ref(null);

        const form = reactive({
          name: '',
          phone: '',
          smsCode: '',
          age: 35,
          position: '',
          experience: 'no',
          salary: '',
          remark: '',
          channelCode: channelCode,
          referrerCode: referrerCode
        });

        const smsCountdown = ref(0);
        let smsTimer = null;

        const rules = {
          name: [{ required: true, message: '请输入姓名', trigger: 'blur' }],
          phone: [
            { required: true, message: '请输入手机号码', trigger: 'blur' },
            { pattern: /^1[3-9]\d{9}$/, message: '手机号码格式不正确', trigger: 'blur' }
          ],
          smsCode: [
            { required: true, message: '请输入短信验证码', trigger: 'blur' },
            { pattern: /^\d{6}$/, message: '验证码为6位数字', trigger: 'blur' }
          ],
          age: [{ required: true, message: '请输入年龄', trigger: 'change' }],
          position: [{ required: true, message: '请选择目标岗位', trigger: 'change' }],
          experience: [{ required: true, message: '请选择是否有经验', trigger: 'change' }]
        };

        // 模拟验证邀请码
        const verifyInviteCode = () => {
          if (!inviteCodeInput.value) {
            ElementPlus.ElMessage.warning('请输入邀请码');
            return;
          }
          // 模拟验证成功
          referrerInfo.value = {
            name: '张阿姨',
            code: inviteCodeInput.value
          };
          form.referrerCode = inviteCodeInput.value;
          ElementPlus.ElMessage.success('邀请码验证成功');
        };

        // 发送短信验证码
        const sendSmsCode = () => {
          if (!/^1[3-9]\d{9}$/.test(form.phone)) {
            ElementPlus.ElMessage.warning('请输入正确的手机号码');
            return;
          }
          // 模拟发送
          ElementPlus.ElMessage.success('验证码已发送');
          smsCountdown.value = 60;
          smsTimer = setInterval(() => {
            smsCountdown.value--;
            if (smsCountdown.value <= 0) {
              clearInterval(smsTimer);
            }
          }, 1000);
        };

        // 模拟已存在的手机号数据库
        const existingPhones = ['13800138000', '13900139000', '13700137000'];

        // 检查手机号是否已存在
        const checkPhoneExists = (phone) => {
          return existingPhones.includes(phone);
        };

        const submitForm = () => {
          formRef.value.validate((valid) => {
            if (valid) {
              // 检查手机号是否已存在
              if (checkPhoneExists(form.phone)) {
                ElementPlus.ElMessage.error('号码已存在，请勿重复提交');
                return;
              }
              // 模拟提交
              console.log('提交数据:', form);
              // 将手机号添加到已存在列表（模拟）
              existingPhones.push(form.phone);
              submitted.value = true;
              ElementPlus.ElMessage.success('报名成功');
            }
          });
        };

        const submitAnother = () => {
          submitted.value = false;
          form.name = '';
          form.phone = '';
          form.smsCode = '';
          form.position = '';
          form.remark = '';
        };

        onMounted(() => {
          // 模拟根据URL参数加载渠道和推荐人信息
          if (channelCode) {
            const channelMap = {
              'WX001': { name: '微信广告', type: 'online' },
              'DY001': { name: '抖音推广', type: 'online' },
              'DT001': { name: '地推活动', type: 'offline' },
              'ZJ001': { name: '老带新转介绍', type: 'intro' },
              'GW001': { name: '官网注册', type: 'online' }
            };
            channelInfo.value = channelMap[channelCode] || { name: '未知渠道', type: 'other' };
          }

          if (referrerCode) {
            // 解析推荐人信息（实际项目中从后端获取）
            const referrerMap = {
              'WX001A': { name: '张阿姨' },
              'DT001A': { name: '李大哥' },
              'DT001B': { name: '王姐' },
              'ZJ001A': { name: '刘阿姨' },
              'ZJ001B': { name: '孙大姐' }
            };
            referrerInfo.value = referrerMap[referrerCode] || null;
          }
        });

        return {
          formRef,
          submitted,
          inviteCodeInput,
          channelInfo,
          referrerInfo,
          form,
          rules,
          smsCountdown,
          verifyInviteCode,
          sendSmsCode,
          submitForm,
          submitAnother
        };
      }
    }).use(ElementPlus).mount('#app');
  </script>
</body>
</html>
