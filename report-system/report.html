<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报表详情</title>
    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Element Plus CSS -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <!-- Element Plus JS -->
    <script src="https://unpkg.com/element-plus"></script>
    <!-- Element Plus Icons -->
    <script src="https://unpkg.com/@element-plus/icons-vue@2/dist/index.iife.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        /* 顶部导航栏 */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .back-btn {
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .page-title {
            font-size: 18px;
            font-weight: bold;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .role-badge {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
        /* 主体内容 */
        .main-content {
            flex: 1;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        /* 报表信息卡片 */
        .info-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 15px;
        }
        .info-title-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .info-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        .info-text h2 {
            font-size: 20px;
            color: #303133;
            margin-bottom: 5px;
        }
        .info-text p {
            font-size: 14px;
            color: #606266;
        }
        .info-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        /* 数据概览 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #409eff;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 13px;
            color: #909399;
        }
        /* 图表区域 */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .chart-title {
            font-size: 16px;
            font-weight: bold;
            color: #303133;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ebeef5;
        }
        /* 模拟图表样式 */
        .mock-chart {
            height: 250px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding: 20px 0;
            gap: 10px;
        }
        .bar {
            flex: 1;
            background: linear-gradient(to top, #409eff, #79bbff);
            border-radius: 4px 4px 0 0;
            min-height: 30px;
            position: relative;
            transition: all 0.3s;
        }
        .bar:hover {
            background: linear-gradient(to top, #337ecc, #409eff);
        }
        .bar-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #606266;
            white-space: nowrap;
        }
        .bar-value {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #409eff;
            font-weight: bold;
        }
        /* 饼图模拟 */
        .pie-chart {
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }
        .pie {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: conic-gradient(
                #409eff 0deg 120deg,
                #67c23a 120deg 240deg,
                #e6a23c 240deg 360deg
            );
        }
        .pie-legend {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #606266;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 2px;
        }
        /* 数据表格 */
        .table-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        /* 访问权限提示 */
        .access-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: #f4f4f5;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 13px;
            color: #606266;
            flex-wrap: wrap;
        }
        /* 页脚 */
        .footer {
            text-align: center;
            padding: 30px;
            color: #909399;
            font-size: 13px;
        }
        /* 错误提示 */
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
            padding: 20px;
        }
        .error-icon {
            font-size: 80px;
            color: #f56c6c;
            margin-bottom: 20px;
        }
        .error-title {
            font-size: 24px;
            color: #303133;
            margin-bottom: 10px;
        }
        .error-desc {
            font-size: 14px;
            color: #606266;
            margin-bottom: 30px;
        }
        /* 移动端适配 */
        @media (max-width: 768px) {
            .header {
                padding: 0 15px;
            }
            .header-left {
                gap: 10px;
            }
            .page-title {
                font-size: 14px;
            }
            .main-content {
                padding: 15px;
            }
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            .stat-card {
                padding: 15px;
            }
            .stat-value {
                font-size: 20px;
            }
            .charts-row {
                grid-template-columns: 1fr;
            }
            .info-header {
                flex-direction: column;
            }
            .pie-chart {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="app" class="app-container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-left">
                <div class="back-btn" @click="goBack">
                    <el-icon><Arrow-Left /></el-icon>
                    <span>返回列表</span>
                </div>
                <span class="page-title">报表详情</span>
            </div>
            <div class="header-right">
                <span class="role-badge">
                    <el-icon><User /></el-icon>
                    当前角色: {{ currentRoleName }}
                </span>
            </div>
        </header>

        <!-- 主体内容 -->
        <main class="main-content">
            <!-- 加载状态 -->
            <div v-if="loading" style="text-align: center; padding: 100px;">
                <el-icon class="is-loading" :size="40" color="#409eff">
                    <Loading />
                </el-icon>
                <p style="margin-top: 20px; color: #909399;">加载中...</p>
            </div>

            <!-- 无权限提示 -->
            <div v-else-if="!hasAccess" class="error-container">
                <div class="error-icon">
                    <el-icon :size="80" color="#f56c6c"><Circle-Close /></el-icon>
                </div>
                <h2 class="error-title">无权访问此报表</h2>
                <p class="error-desc">
                    当前角色【{{ currentRoleName }}】没有查看此报表的权限<br>
                    请联系管理员申请权限，或切换其他角色
                </p>
                <el-button type="primary" @click="goBack">
                    <el-icon><Arrow-Left /></el-icon>
                    返回报表列表
                </el-button>
            </div>

            <!-- 报表内容 -->
            <template v-else>
                <!-- 报表信息 -->
                <div class="info-card">
                    <div class="info-header">
                        <div class="info-title-section">
                            <div
                                class="info-icon"
                                :style="{ background: report.iconBg, color: report.iconColor }"
                            >
                                <el-icon :size="28">
                                    <component :is="report.icon || 'Document'" />
                                </el-icon>
                            </div>
                            <div class="info-text">
                                <h2>{{ report.title }}</h2>
                                <p>{{ report.description }}</p>
                            </div>
                        </div>
                    </div>
                    <div class="access-info">
                        <el-icon><Info-Filled /></el-icon>
                        <span>访问权限：</span>
                        <el-tag
                            v-for="role in report.allowedRoles"
                            :key="role"
                            size="small"
                            :type="role === currentRole ? 'success' : 'info'"
                            style="margin-right: 5px;"
                        >
                            {{ getRoleName(role) }}
                        </el-tag>
                        <span style="margin-left: auto;">更新时间：{{ report.updateTime }}</span>
                    </div>
                </div>

                <!-- 数据概览 -->
                <div class="stats-row">
                    <div class="stat-card" v-for="(stat, index) in mockStats" :key="index">
                        <div class="stat-value">{{ stat.value }}</div>
                        <div class="stat-label">{{ stat.label }}</div>
                    </div>
                </div>

                <!-- 图表区域 -->
                <div class="charts-row">
                    <div class="chart-card">
                        <div class="chart-title">
                            <el-icon><Trend-Charts /></el-icon>
                            趋势分析
                        </div>
                        <div class="mock-chart">
                            <div
                                v-for="(item, index) in mockChartData"
                                :key="index"
                                class="bar"
                                :style="{ height: item.height + '%' }"
                            >
                                <span class="bar-value">{{ item.value }}</span>
                                <span class="bar-label">{{ item.label }}</span>
                            </div>
                        </div>
                    </div>
                    <div class="chart-card">
                        <div class="chart-title">
                            <el-icon><Pie-Chart /></el-icon>
                            占比分布
                        </div>
                        <div class="pie-chart">
                            <div class="pie"></div>
                            <div class="pie-legend">
                                <div class="legend-item">
                                    <div class="legend-color" style="background: #409eff;"></div>
                                    <span>类别 A (33.3%)</span>
                                </div>
                                <div class="legend-item">
                                    <div class="legend-color" style="background: #67c23a;"></div>
                                    <span>类别 B (33.3%)</span>
                                </div>
                                <div class="legend-item">
                                    <div class="legend-color" style="background: #e6a23c;"></div>
                                    <span>类别 C (33.3%)</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 数据明细表格 -->
                <div class="table-card">
                    <div class="chart-title">
                        <el-icon><List /></el-icon>
                        数据明细
                    </div>
                    <el-table :data="mockTableData" stripe style="width: 100%">
                        <el-table-column prop="date" label="日期" width="120" />
                        <el-table-column prop="name" label="项目" />
                        <el-table-column prop="category" label="类别" width="120">
                            <template #default="scope">
                                <el-tag :type="scope.row.tagType" size="small">
                                    {{ scope.row.category }}
                                </el-tag>
                            </template>
                        </el-table-column>
                        <el-table-column prop="amount" label="金额" width="150" align="right">
                            <template #default="scope">
                                <span style="color: #409eff; font-weight: bold;">
                                    ¥{{ scope.row.amount }}
                                </span>
                            </template>
                        </el-table-column>
                        <el-table-column prop="status" label="状态" width="100">
                            <template #default="scope">
                                <el-tag :type="scope.row.statusType" size="small">
                                    {{ scope.row.status }}
                                </el-tag>
                            </template>
                        </el-table-column>
                    </el-table>
                    <div style="margin-top: 20px; display: flex; justify-content: flex-end;">
                        <el-pagination
                            background
                            layout="prev, pager, next"
                            :total="100"
                            :page-size="10"
                        />
                    </div>
                </div>
            </template>
        </main>

        <!-- 页脚 -->
        <footer class="footer">
            <p>&copy; 2024 报表管理系统 - 演示原型</p>
        </footer>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        const {
            ArrowLeft, User, Loading, CircleClose, Refresh, Download, Share,
            InfoFilled, TrendCharts, PieChart, List, Document
        } = ElementPlusIconsVue;

        createApp({
            components: {
                ArrowLeft, User, Loading, CircleClose, Refresh, Download, Share,
                InfoFilled, TrendCharts, PieChart, List, Document
            },
            setup() {
                // ==================== 从 URL 获取参数 ====================
                const urlParams = new URLSearchParams(window.location.search);
                const reportId = ref(urlParams.get('id') || '');
                const currentRole = ref(urlParams.get('role') || '');
                const reportTitle = ref(decodeURIComponent(urlParams.get('title') || ''));

                // ==================== Mock 数据：角色列表 ====================
                const roles = ref([
                    { id: 'admin', name: '系统管理员' },
                    { id: 'finance', name: '财务人员' },
                    { id: 'sales', name: '销售经理' },
                    { id: 'hr', name: '人事专员' },
                    { id: 'operator', name: '运营人员' },
                    { id: 'guest', name: '普通访客' }
                ]);

                // ==================== Mock 数据：报表定义 ====================
                // 用于权限校验，确保用户只能访问其有权限的报表
                const reports = ref([
                    {
                        id: 1,
                        title: '月度销售报表',
                        description: '展示各区域月度销售业绩、同比增长率、目标完成情况等核心指标分析。',
                        icon: 'TrendCharts',
                        iconBg: '#ecf5ff',
                        iconColor: '#409eff',
                        allowedRoles: ['admin', 'sales', 'finance'],
                        updateTime: '2024-01-15'
                    },
                    {
                        id: 2,
                        title: '财务报表总览',
                        description: '公司整体财务状况，包含资产负债表、利润表、现金流量表等财务数据。',
                        icon: 'Money',
                        iconBg: '#f0f9eb',
                        iconColor: '#67c23a',
                        allowedRoles: ['admin', 'finance'],
                        updateTime: '2024-01-14'
                    },
                    {
                        id: 3,
                        title: '库存管理报表',
                        description: '实时库存数据、库存周转率、缺货预警、滞销商品分析等仓储相关报表。',
                        icon: 'Goods',
                        iconBg: '#fdf6ec',
                        iconColor: '#e6a23c',
                        allowedRoles: ['admin', 'operator', 'sales'],
                        updateTime: '2024-01-13'
                    },
                    {
                        id: 4,
                        title: '员工绩效报表',
                        description: '各部门员工绩效考核结果、KPI完成情况、绩效分布分析等人力资源数据。',
                        icon: 'Avatar',
                        iconBg: '#f4f4f5',
                        iconColor: '#909399',
                        allowedRoles: ['admin', 'hr'],
                        updateTime: '2024-01-12'
                    },
                    {
                        id: 5,
                        title: '部门运营分析',
                        description: '各部门运营成本、效率指标、项目进度等运营管理核心数据分析。',
                        icon: 'OfficeBuilding',
                        iconBg: '#ecf5ff',
                        iconColor: '#409eff',
                        allowedRoles: ['admin', 'operator'],
                        updateTime: '2024-01-11'
                    },
                    {
                        id: 6,
                        title: '客户订单报表',
                        description: '订单量统计、客户分布、订单趋势、客单价分析等销售相关数据。',
                        icon: 'ShoppingCart',
                        iconBg: '#f0f9eb',
                        iconColor: '#67c23a',
                        allowedRoles: ['admin', 'sales', 'operator'],
                        updateTime: '2024-01-10'
                    },
                    {
                        id: 7,
                        title: '员工福利统计',
                        description: '员工福利发放情况、福利成本分析、满意度调查结果等HR相关报表。',
                        icon: 'FirstAidKit',
                        iconBg: '#fdf6ec',
                        iconColor: '#e6a23c',
                        allowedRoles: ['admin', 'hr', 'finance'],
                        updateTime: '2024-01-09'
                    },
                    {
                        id: 8,
                        title: '公开数据看板',
                        description: '公司公开经营数据、新闻动态、对外披露信息等所有员工可见的报表。',
                        icon: 'View',
                        iconBg: '#f4f4f5',
                        iconColor: '#909399',
                        allowedRoles: ['admin', 'finance', 'sales', 'hr', 'operator', 'guest'],
                        updateTime: '2024-01-08'
                    }
                ]);

                // ==================== 状态变量 ====================
                const loading = ref(true);
                const report = ref({});

                // ==================== 计算属性 ====================
                const currentRoleName = computed(() => {
                    const role = roles.value.find(r => r.id === currentRole.value);
                    return role ? role.name : currentRole.value;
                });

                // 检查当前角色是否有权限访问此报表
                const hasAccess = computed(() => {
                    if (!report.value.allowedRoles) return false;
                    return report.value.allowedRoles.includes(currentRole.value);
                });

                // ==================== Mock 数据：统计指标 ====================
                const mockStats = ref([
                    { value: '¥1,234,567', label: '总金额' },
                    { value: '+23.5%', label: '同比增长' },
                    { value: '1,234', label: '订单数量' },
                    { value: '98.5%', label: '完成率' }
                ]);

                // ==================== Mock 数据：图表数据 ====================
                const mockChartData = ref([
                    { label: '1月', value: 120, height: 40 },
                    { label: '2月', value: 200, height: 65 },
                    { label: '3月', value: 150, height: 50 },
                    { label: '4月', value: 80, height: 27 },
                    { label: '5月', value: 70, height: 23 },
                    { label: '6月', value: 110, height: 37 },
                    { label: '7月', value: 130, height: 43 }
                ]);

                // ==================== Mock 数据：表格数据 ====================
                const mockTableData = ref([
                    { date: '2024-01-15', name: '项目A数据汇总', category: '销售收入', tagType: 'primary', amount: '125,000', status: '已完成', statusType: 'success' },
                    { date: '2024-01-14', name: '项目B月度结算', category: '成本支出', tagType: 'danger', amount: '89,500', status: '审核中', statusType: 'warning' },
                    { date: '2024-01-13', name: '项目C合同回款', category: '销售收入', tagType: 'primary', amount: '234,000', status: '已完成', statusType: 'success' },
                    { date: '2024-01-12', name: '项目D采购支出', category: '采购成本', tagType: 'warning', amount: '67,800', status: '待审批', statusType: 'info' },
                    { date: '2024-01-11', name: '项目E服务费用', category: '运营费用', tagType: 'info', amount: '45,200', status: '已完成', statusType: 'success' }
                ]);

                // ==================== 方法：获取角色名称 ====================
                const getRoleName = (roleId) => {
                    const role = roles.value.find(r => r.id === roleId);
                    return role ? role.name : roleId;
                };

                // ==================== 方法：返回列表页 ====================
                const goBack = () => {
                    // 返回列表页，保留当前角色信息
                    window.location.href = `index.html?role=${currentRole.value}`;
                };

                // ==================== 方法：刷新数据 ====================
                const refreshData = () => {
                    ElementPlus.ElMessage.success('数据已刷新');
                    // 模拟数据变化
                    mockStats.value[0].value = '¥' + Math.floor(Math.random() * 2000000).toLocaleString();
                };

                // ==================== 方法：导出报表 ====================
                const exportReport = () => {
                    ElementPlus.ElMessage.success('报表导出成功');
                };

                // ==================== 方法：分享报表 ====================
                const shareReport = () => {
                    ElementPlus.ElMessage.info('分享链接已复制到剪贴板');
                };

                // ==================== 生命周期：页面加载时 ====================
                onMounted(() => {
                    // 模拟加载延迟
                    setTimeout(() => {
                        // 查找对应的报表
                        const found = reports.value.find(r => r.id === parseInt(reportId.value));
                        if (found) {
                            report.value = found;
                        } else {
                            // 如果没找到，可能是直接访问，使用URL中的标题创建临时对象
                            report.value = {
                                id: reportId.value,
                                title: reportTitle.value || '未知报表',
                                description: '该报表的详细信息',
                                icon: 'Document',
                                iconBg: '#f4f4f5',
                                iconColor: '#909399',
                                allowedRoles: [currentRole.value],
                                updateTime: new Date().toISOString().split('T')[0]
                            };
                        }
                        loading.value = false;
                    }, 500);
                });

                return {
                    reportId,
                    currentRole,
                    currentRoleName,
                    report,
                    loading,
                    hasAccess,
                    mockStats,
                    mockChartData,
                    mockTableData,
                    getRoleName,
                    goBack,
                    refreshData,
                    exportReport,
                    shareReport
                };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
