<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报表中心</title>
    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Element Plus CSS -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <!-- Element Plus JS -->
    <script src="https://unpkg.com/element-plus"></script>
    <!-- Element Plus Icons -->
    <script src="https://unpkg.com/@element-plus/icons-vue@2/dist/index.iife.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f5f7fa;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        .app-container {
            min-height: 100vh;
        }
        /* 顶部导航栏 */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .current-role {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
        /* 主体内容区 */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        /* 角色切换卡片 */
        .role-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .role-card h3 {
            margin-bottom: 15px;
            color: #303133;
            font-size: 16px;
        }
        .role-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .role-tag {
            cursor: pointer;
            transition: all 0.3s;
        }
        .role-tag:hover {
            transform: translateY(-2px);
        }
        /* 统计信息 */
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: white;
            border-radius: 8px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            flex: 1;
            min-width: 150px;
        }
        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        .stat-icon.blue { background: #ecf5ff; color: #409eff; }
        .stat-icon.green { background: #f0f9eb; color: #67c23a; }
        .stat-icon.orange { background: #fdf6ec; color: #e6a23c; }
        .stat-info {
            display: flex;
            flex-direction: column;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #303133;
        }
        .stat-label {
            font-size: 12px;
            color: #909399;
        }
        /* 管理员操作栏 */
        .admin-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        /* 报表列表 */
        .report-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .report-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
            position: relative;
        }
        .report-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            border-color: #409eff;
        }
        .report-card-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .report-card:hover .report-card-actions {
            opacity: 1;
        }
        .report-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-right: 60px;
        }
        .report-title {
            font-size: 16px;
            font-weight: bold;
            color: #303133;
            line-height: 1.4;
        }
        .report-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        .report-desc {
            font-size: 13px;
            color: #606266;
            line-height: 1.6;
            margin-bottom: 15px;
            height: 40px;
            overflow: hidden;
        }
        .report-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #ebeef5;
        }
        .report-roles {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }
        .report-date {
            font-size: 12px;
            color: #909399;
        }
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #909399;
        }
        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        /* 页脚 */
        .footer {
            text-align: center;
            padding: 30px;
            color: #909399;
            font-size: 13px;
        }
        /* 弹窗样式 */
        .dialog-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        /* 移动端适配 */
        @media (max-width: 768px) {
            .header {
                padding: 0 15px;
                flex-wrap: wrap;
                height: auto;
                min-height: 60px;
                padding-top: 10px;
                padding-bottom: 10px;
            }
            .logo {
                font-size: 16px;
            }
            .main-content {
                padding: 15px;
            }
            .report-list {
                grid-template-columns: 1fr;
            }
            .stats-bar {
                flex-direction: column;
            }
            .report-card-actions {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div id="app" class="app-container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo">
                <el-icon :size="24"><Document /></el-icon>
                <span>报表中心</span>
            </div>
            <div class="user-section">
                <span class="current-role">
                    <el-icon><User /></el-icon>
                    当前角色: {{ currentRole.name }}
                </span>
            </div>
        </header>

        <!-- 主体内容 -->
        <main class="main-content">
            <!-- 角色切换 -->
            <div class="role-card">
                <h3>
                    <el-icon><Switch /></el-icon>
                    切换角色（模拟不同用户登录）
                </h3>
                <div class="role-tags">
                    <el-tag
                        v-for="role in roles"
                        :key="role.id"
                        :type="currentRole.id === role.id ? 'primary' : 'info'"
                        :effect="currentRole.id === role.id ? 'dark' : 'plain'"
                        class="role-tag"
                        size="large"
                        @click="switchRole(role)"
                    >
                        {{ role.name }}
                    </el-tag>
                </div>
            </div>

    

            <!-- 管理员操作栏：仅管理员可见 -->
            <div v-if="isAdmin" class="admin-bar">
                <el-button type="primary" @click="openAddDialog">
                    <el-icon><Plus /></el-icon>
                    新增报表
                </el-button>
            </div>

            <!-- 报表列表 -->
            <div v-if="filteredReports.length > 0" class="report-list">
                <div
                    v-for="report in filteredReports"
                    :key="report.id"
                    class="report-card"
                    @click="goToReport(report)"
                >
                    <!-- 管理员编辑按钮：仅管理员可见 -->
                    <div v-if="isAdmin" class="report-card-actions" @click.stop>
                        <el-button
                            type="primary"
                            size="small"
                            circle
                            @click="openEditDialog(report)"
                        >
                            <el-icon><Edit /></el-icon>
                        </el-button>
                        <el-button
                            type="danger"
                            size="small"
                            circle
                            @click="deleteReport(report)"
                        >
                            <el-icon><Delete /></el-icon>
                        </el-button>
                    </div>

                    <div class="report-header">
                        <div>
                            <div class="report-title">{{ report.title }}</div>
                        </div>
                        <div
                            class="report-icon"
                            :style="{ background: report.iconBg, color: report.iconColor }"
                        >
                            <el-icon :size="24">
                                <component :is="report.icon" />
                            </el-icon>
                        </div>
                    </div>
                    <div class="report-desc">{{ report.description }}</div>
                    <div class="report-meta">
                        <div class="report-roles">
                            <el-tag
                                v-for="role in report.allowedRoles"
                                :key="role"
                                size="small"
                                :type="role === currentRole.id ? 'success' : 'info'"
                            >
                                {{ getRoleName(role) }}
                            </el-tag>
                        </div>
                        <span class="report-date">{{ report.updateTime }}</span>
                    </div>
                </div>
            </div>

            <!-- 空状态 -->
            <div v-else class="empty-state">
                <div class="empty-icon">
                    <el-icon :size="64" color="#dcdfe6"><Lock /></el-icon>
                </div>
                <h3>暂无权限访问报表</h3>
                <p>当前角色【{{ currentRole.name }}】没有可查看的报表</p>
            </div>
        </main>

        <!-- 页脚 -->
        <footer class="footer">
            <p>演示原型</p>
        </footer>

        <!-- 新增/编辑报表弹窗 -->
        <el-dialog
            v-model="dialogVisible"
            :title="dialogTitle"
            width="600px"
            destroy-on-close
        >
            <el-form
                ref="formRef"
                :model="formData"
                :rules="formRules"
                label-width="100px"
                label-position="right"
            >
                <el-form-item label="报表标题" prop="title">
                    <el-input
                        v-model="formData.title"
                        placeholder="请输入报表标题"
                        maxlength="50"
                        show-word-limit
                    />
                </el-form-item>

                <el-form-item label="报表描述" prop="description">
                    <el-input
                        v-model="formData.description"
                        type="textarea"
                        :rows="3"
                        placeholder="请输入报表描述"
                        maxlength="200"
                        show-word-limit
                    />
                </el-form-item>

                <el-form-item label="访问权限" prop="allowedRoles">
                    <el-select
                        v-model="formData.allowedRoles"
                        multiple
                        placeholder="请选择可访问的角色"
                        style="width: 100%"
                    >
                        <el-option
                            v-for="role in roles"
                            :key="role.id"
                            :label="role.name"
                            :value="role.id"
                        />
                    </el-select>
                    <div style="font-size: 12px; color: #909399; margin-top: 5px;">
                        至少选择一个角色，未选择的角色将无法查看此报表
                    </div>
                </el-form-item>

                <el-form-item label="报表链接" prop="url">
                    <el-input
                        v-model="formData.url"
                        placeholder="请输入报表外部链接地址"
                    />
                </el-form-item>

                <el-form-item label="图标样式">
                    <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                        <div
                            v-for="icon in iconOptions"
                            :key="icon.name"
                            class="icon-option"
                            :class="{ active: formData.icon === icon.name }"
                            :style="{ background: icon.bg, color: icon.color }"
                            @click="selectIcon(icon)"
                        >
                            <el-icon :size="24">
                                <component :is="icon.name" />
                            </el-icon>
                        </div>
                    </div>
                </el-form-item>
            </el-form>

            <template #footer>
                <div class="dialog-footer">
                    <el-button @click="dialogVisible = false">取消</el-button>
                    <el-button type="primary" @click="submitForm">
                        {{ isEdit ? '保存' : '创建' }}
                    </el-button>
                </div>
            </template>
        </el-dialog>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;
        const { Document, User, Switch, View, Collection, Lock, TrendCharts, Money, Goods, Avatar, OfficeBuilding, ShoppingCart, FirstAidKit, Plus, Edit, Delete } = ElementPlusIconsVue;

        createApp({
            components: {
                Document, User, Switch, View, Collection, Lock, TrendCharts, Money, Goods, Avatar, OfficeBuilding, ShoppingCart, FirstAidKit, Plus, Edit, Delete
            },
            setup() {
                // ==================== Mock 数据：角色定义 ====================
                const roles = ref([
                    { id: 'admin', name: '系统管理员' },
                    { id: 'finance', name: '财务人员' },
                    { id: 'sales', name: '销售经理' },
                    { id: 'hr', name: '人事专员' },
                    { id: 'operator', name: '运营人员' },
                    { id: 'guest', name: '普通访客' }
                ]);

                // 当前角色，默认管理员
                const currentRole = ref(roles.value[0]);

                // ==================== 计算属性：是否为管理员 ====================
                const isAdmin = computed(() => currentRole.value.id === 'admin');

                // ==================== Mock 数据：报表列表 ====================
                // 每个报表有标题、描述、图标、允许访问的角色列表等信息
                const reports = ref([
                    {
                        id: 1,
                        title: '月度销售报表',
                        description: '展示各区域月度销售业绩、同比增长率、目标完成情况等核心指标分析。',
                        icon: 'TrendCharts',
                        iconBg: '#ecf5ff',
                        iconColor: '#409eff',
                        allowedRoles: ['admin', 'sales', 'finance'],
                        updateTime: '2024-01-15',
                        url: 'https://example.com/reports/sales-monthly'
                    },
                    {
                        id: 2,
                        title: '财务报表总览',
                        description: '公司整体财务状况，包含资产负债表、利润表、现金流量表等财务数据。',
                        icon: 'Money',
                        iconBg: '#f0f9eb',
                        iconColor: '#67c23a',
                        allowedRoles: ['admin', 'finance'],
                        updateTime: '2024-01-14',
                        url: 'https://example.com/reports/finance-overview'
                    },
                    {
                        id: 3,
                        title: '库存管理报表',
                        description: '实时库存数据、库存周转率、缺货预警、滞销商品分析等仓储相关报表。',
                        icon: 'Goods',
                        iconBg: '#fdf6ec',
                        iconColor: '#e6a23c',
                        allowedRoles: ['admin', 'operator', 'sales'],
                        updateTime: '2024-01-13',
                        url: 'https://example.com/reports/inventory'
                    },
                    {
                        id: 4,
                        title: '员工绩效报表',
                        description: '各部门员工绩效考核结果、KPI完成情况、绩效分布分析等人力资源数据。',
                        icon: 'Avatar',
                        iconBg: '#f4f4f5',
                        iconColor: '#909399',
                        allowedRoles: ['admin', 'hr'],
                        updateTime: '2024-01-12',
                        url: 'https://example.com/reports/hr-performance'
                    },
                    {
                        id: 5,
                        title: '部门运营分析',
                        description: '各部门运营成本、效率指标、项目进度等运营管理核心数据分析。',
                        icon: 'OfficeBuilding',
                        iconBg: '#ecf5ff',
                        iconColor: '#409eff',
                        allowedRoles: ['admin', 'operator'],
                        updateTime: '2024-01-11',
                        url: 'https://example.com/reports/dept-operations'
                    },
                    {
                        id: 6,
                        title: '客户订单报表',
                        description: '订单量统计、客户分布、订单趋势、客单价分析等销售相关数据。',
                        icon: 'ShoppingCart',
                        iconBg: '#f0f9eb',
                        iconColor: '#67c23a',
                        allowedRoles: ['admin', 'sales', 'operator'],
                        updateTime: '2024-01-10',
                        url: 'https://example.com/reports/orders'
                    },
                    {
                        id: 7,
                        title: '员工福利统计',
                        description: '员工福利发放情况、福利成本分析、满意度调查结果等HR相关报表。',
                        icon: 'FirstAidKit',
                        iconBg: '#fdf6ec',
                        iconColor: '#e6a23c',
                        allowedRoles: ['admin', 'hr', 'finance'],
                        updateTime: '2024-01-09',
                        url: 'https://example.com/reports/hr-benefits'
                    },
                    {
                        id: 8,
                        title: '公开数据看板',
                        description: '公司公开经营数据、新闻动态、对外披露信息等所有员工可见的报表。',
                        icon: 'View',
                        iconBg: '#f4f4f5',
                        iconColor: '#909399',
                        allowedRoles: ['admin', 'finance', 'sales', 'hr', 'operator', 'guest'],
                        updateTime: '2024-01-08',
                        url: 'https://example.com/reports/public-dashboard'
                    }
                ]);

                // ==================== 图标选项 ====================
                const iconOptions = [
                    { name: 'TrendCharts', bg: '#ecf5ff', color: '#409eff' },
                    { name: 'Money', bg: '#f0f9eb', color: '#67c23a' },
                    { name: 'Goods', bg: '#fdf6ec', color: '#e6a23c' },
                    { name: 'Avatar', bg: '#f4f4f5', color: '#909399' },
                    { name: 'OfficeBuilding', bg: '#ecf5ff', color: '#409eff' },
                    { name: 'ShoppingCart', bg: '#f0f9eb', color: '#67c23a' },
                    { name: 'FirstAidKit', bg: '#fdf6ec', color: '#e6a23c' },
                    { name: 'View', bg: '#f4f4f5', color: '#909399' },
                    { name: 'Document', bg: '#fef0f0', color: '#f56c6c' },
                    { name: 'Collection', bg: '#f0f9eb', color: '#67c23a' }
                ];

                // ==================== 计算属性：根据当前角色过滤报表 ====================
                const filteredReports = computed(() => {
                    return reports.value.filter(report =>
                        report.allowedRoles.includes(currentRole.value.id)
                    );
                });

                // ==================== 弹窗相关 ====================
                const dialogVisible = ref(false);
                const isEdit = ref(false);
                const dialogTitle = computed(() => isEdit.value ? '编辑报表' : '新增报表');
                const formRef = ref(null);

                // 表单数据
                const formData = ref({
                    id: null,
                    title: '',
                    description: '',
                    allowedRoles: [],
                    url: '',
                    icon: 'Document',
                    iconBg: '#f4f4f5',
                    iconColor: '#909399'
                });

                // 表单验证规则
                const formRules = {
                    title: [
                        { required: true, message: '请输入报表标题', trigger: 'blur' },
                        { min: 2, max: 50, message: '长度在 2 到 50 个字符', trigger: 'blur' }
                    ],
                    description: [
                        { required: true, message: '请输入报表描述', trigger: 'blur' }
                    ],
                    allowedRoles: [
                        { required: true, message: '请至少选择一个可访问角色', trigger: 'change', type: 'array', min: 1 }
                    ],
                    url: [
                        { required: true, message: '请输入报表链接', trigger: 'blur' },
                        { type: 'url', message: '请输入有效的URL地址', trigger: 'blur' }
                    ]
                };

                // ==================== 方法：切换角色 ====================
                const switchRole = (role) => {
                    currentRole.value = role;
                    ElementPlus.ElMessage.success(`已切换到：${role.name}`);
                };

                // ==================== 方法：获取角色名称 ====================
                const getRoleName = (roleId) => {
                    const role = roles.value.find(r => r.id === roleId);
                    return role ? role.name : roleId;
                };

                // ==================== 方法：跳转到报表页面 ====================
                const goToReport = (report) => {
                    const params = new URLSearchParams({
                        id: report.id,
                        role: currentRole.value.id,
                        title: encodeURIComponent(report.title)
                    });
                    window.location.href = `report.html?${params.toString()}`;
                };

                // ==================== 方法：打开新增弹窗 ====================
                const openAddDialog = () => {
                    isEdit.value = false;
                    formData.value = {
                        id: null,
                        title: '',
                        description: '',
                        allowedRoles: ['admin'],
                        url: 'https://example.com/reports/',
                        icon: 'Document',
                        iconBg: '#f4f4f5',
                        iconColor: '#909399'
                    };
                    dialogVisible.value = true;
                };

                // ==================== 方法：打开编辑弹窗 ====================
                const openEditDialog = (report) => {
                    isEdit.value = true;
                    formData.value = { ...report };
                    dialogVisible.value = true;
                };

                // ==================== 方法：选择图标 ====================
                const selectIcon = (icon) => {
                    formData.value.icon = icon.name;
                    formData.value.iconBg = icon.bg;
                    formData.value.iconColor = icon.color;
                };

                // ==================== 方法：提交表单 ====================
                const submitForm = async () => {
                    if (!formRef.value) return;

                    await formRef.value.validate((valid) => {
                        if (valid) {
                            if (isEdit.value) {
                                // 编辑模式：更新现有报表
                                const index = reports.value.findIndex(r => r.id === formData.value.id);
                                if (index !== -1) {
                                    reports.value[index] = {
                                        ...formData.value,
                                        updateTime: new Date().toISOString().split('T')[0]
                                    };
                                    ElementPlus.ElMessage.success('报表更新成功');
                                }
                            } else {
                                // 新增模式：添加新报表
                                const newId = Math.max(...reports.value.map(r => r.id)) + 1;
                                reports.value.push({
                                    ...formData.value,
                                    id: newId,
                                    updateTime: new Date().toISOString().split('T')[0]
                                });
                                ElementPlus.ElMessage.success('报表创建成功');
                            }
                            dialogVisible.value = false;
                        }
                    });
                };

                // ==================== 方法：删除报表 ====================
                const deleteReport = (report) => {
                    ElementPlus.ElMessageBox.confirm(
                        `确定要删除报表【${report.title}】吗？`,
                        '删除确认',
                        {
                            confirmButtonText: '确定删除',
                            cancelButtonText: '取消',
                            type: 'warning'
                        }
                    ).then(() => {
                        const index = reports.value.findIndex(r => r.id === report.id);
                        if (index !== -1) {
                            reports.value.splice(index, 1);
                            ElementPlus.ElMessage.success('报表已删除');
                        }
                    }).catch(() => {
                        // 取消删除
                    });
                };

                return {
                    roles,
                    currentRole,
                    isAdmin,
                    reports,
                    filteredReports,
                    iconOptions,
                    dialogVisible,
                    isEdit,
                    dialogTitle,
                    formRef,
                    formData,
                    formRules,
                    switchRole,
                    getRoleName,
                    goToReport,
                    openAddDialog,
                    openEditDialog,
                    selectIcon,
                    submitForm,
                    deleteReport
                };
            }
        }).use(ElementPlus).mount('#app');
    </script>
</body>
</html>
